<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Credit Card Approval Prediction</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container mt-5 mb-5">

<div class="card shadow">

<div class="card-header bg-primary text-white text-center">

<h2>Credit Card Approval Prediction</h2>

</div>

<div class="card-body">

<form action="/predict" method="POST">

<div class="row">

<div class="col-md-6 mb-3">
<label>Applicant ID</label>
<input class="form-control" type="number" name="Applicant_ID" required>
</div>

<div class="col-md-6 mb-3">
<label>Gender</label>

<select class="form-select" name="Applicant_Gender">

<option value="M">Male</option>
<option value="F">Female</option>

</select>

</div>

<div class="col-md-6 mb-3">
<label>Owned Car</label>

<select class="form-select" name="Owned_Car">
<option value="1">Yes</option>
<option value="0">No</option>
</select>

</div>

<div class="col-md-6 mb-3">

<label>Owned Realty</label>

<select class="form-select" name="Owned_Realty">

<option value="1">Yes</option>
<option value="0">No</option>

</select>

</div>

<div class="col-md-6 mb-3">
<label>Total Children</label>
<input class="form-control" type="number" name="Total_Children" required>
</div>

<div class="col-md-6 mb-3">
<label>Total Income</label>
<input class="form-control" type="number" name="Total_Income" required>
</div>

<div class="col-md-6 mb-3">

<label>Income Type</label>

<select class="form-select" name="Income_Type">

<option>Working</option>
<option>Commercial associate</option>
<option>State servant</option>
<option>Pensioner</option>
<option>Student</option>

</select>

</div>

<div class="col-md-6 mb-3">

<label>Education</label>

<select class="form-select" name="Education_Type">

<option>Higher education</option>
<option>Secondary / secondary special</option>
<option>Incomplete higher</option>
<option>Lower secondary</option>
<option>Academic degree</option>

</select>

</div>

<div class="col-md-6 mb-3">

<label>Family Status</label>

<select class="form-select" name="Family_Status">

<option>Married</option>
<option>Single / not married</option>
<option>Civil marriage</option>
<option>Separated</option>
<option>Widow</option>

</select>

</div>

<div class="col-md-6 mb-3">

<label>Housing Type</label>

<select class="form-select" name="Housing_Type">

<option>House / apartment</option>
<option>With parents</option>
<option>Municipal apartment</option>
<option>Rented apartment</option>
<option>Office apartment</option>
<option>Co-op apartment</option>

</select>

</div>

<div class="col-md-6 mb-3">
<label>Mobile Phone</label>

<select class="form-select" name="Owned_Mobile_Phone">
<option value="1">Yes</option>
<option value="0">No</option>
</select>

</div>

<div class="col-md-6 mb-3">
<label>Work Phone</label>

<select class="form-select" name="Owned_Work_Phone">
<option value="1">Yes</option>
<option value="0">No</option>
</select>

</div>

<div class="col-md-6 mb-3">
<label>Phone</label>

<select class="form-select" name="Owned_Phone">
<option value="1">Yes</option>
<option value="0">No</option>
</select>

</div>

<div class="col-md-6 mb-3">
<label>Email</label>

<select class="form-select" name="Owned_Email">
<option value="1">Yes</option>
<option value="0">No</option>
</select>

</div>

<div class="col-md-6 mb-3">

<label>Job Title</label>

<select class="form-select" name="Job_Title">

<option>Managers</option>
<option>Core staff</option>
<option>Laborers</option>
<option>Sales staff</option>
<option>Drivers</option>
<option>Medicine staff</option>
<option>High skill tech staff</option>
<option>Accountants</option>
<option>Cleaning staff</option>
<option>Cooking staff</option>
<option>HR staff</option>
<option>IT staff</option>
<option>Low-skill Laborers</option>
<option>Private service staff</option>
<option>Realty agents</option>
<option>Secretaries</option>
<option>Security staff</option>
<option>Waiters/barmen staff</option>

</select>

</div>

<div class="col-md-6 mb-3">
<label>Total Family Members</label>
<input class="form-control" type="number" step="0.1" name="Total_Family_Members" required>
</div>

<div class="col-md-6 mb-3">
<label>Applicant Age</label>
<input class="form-control" type="number" name="Applicant_Age" required>
</div>

<div class="col-md-6 mb-3">
<label>Years of Working</label>
<input class="form-control" type="number" name="Years_of_Working" required>
</div>

<div class="col-md-6 mb-3">
<label>Total Bad Debt</label>
<input class="form-control" type="number" name="Total_Bad_Debt" required>
</div>

<div class="col-md-6 mb-3">
<label>Total Good Debt</label>
<input class="form-control" type="number" name="Total_Good_Debt" required>
</div>

</div>

<div class="d-grid">

<button class="btn btn-success btn-lg" type="submit">

Predict Credit Card Approval

</button>

</div>

</form>

</div>

</div>

</div>

</body>
</html>
